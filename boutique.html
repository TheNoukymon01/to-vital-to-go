<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Boutique</title>
        <link rel="stylesheet" type="text/css" href="boutique.css">
        <link rel="icon" href="logo.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="banner">
            <div class="leadBanner">
                <img src="logo.png" class="floatLeft iconBanner">
                <h1 class="titleBanner">to <span class="magV">V</span>ital to <span class="magR">G</span>o</h1>
            </div>
            <div class="menu">
                <div class="pMenu"><a href="accueil.html"><p>Accueil</p></a></div>
                <div class="pMenu"><a href="boutique.html"><p>Boutique</p></a></div>
                <div class="pMenu"><a href="contact.html"><p>Contact</p></a></div>
                <div class="pMenu"><a href="https://www.instagram.com/lyon_tram_spotter/" target="_blank"><p>Insta</p></a></div>
            </div>
        </div>

        <main class="boutique">
            <section class="recherche-boutique">
                <input type="search" placeholder="Rechercher des produits" aria-label="Rechercher" class="champ-recherche">
                <button class="btn-recherche">Rechercher</button>
            </section>

            <section class="grille-produits">
                <div class="carte-produit">
                    <img src="creme.jpg" alt="Produit 1">
                    <h4>Crème hydratante</h4>
                    <p class="prix">€15.99</p>
                    <button class="btn-ajouter">Ajouter au panier</button>
                </div>

                <div class="carte-produit">
                    <img src="shampoing.jpg" alt="Produit 2">
                    <h4>Shampooing anti-pelliculaire</h4>
                    <p class="prix">€12.50</p>
                    <button class="btn-ajouter">Ajouter au panier</button>
                </div>

                <div class="carte-produit">
                    <img src="masque.jpg" alt="Produit 3">
                    <h4>Masque de nuit</h4>
                    <p class="prix">€22.00</p>
                    <button class="btn-ajouter">Ajouter au panier</button>
                </div>

                <div class="carte-produit">
                    <img src="vaseline.jpg" alt="Produit 4">
                    <h4>Vaseline</h4>
                    <p class="prix">€9.99</p>
                    <button class="btn-ajouter">Ajouter au panier</button>
                </div>

                <div class="carte-produit">
                    <img src="soins.jpg" alt="Produit 5">
                    <h4>Set de soins du visage</h4>
                    <p class="prix">€26.00</p>
                    <button class="btn-ajouter">Ajouter au panier</button>
                </div>

                <div class="carte-produit">
                    <img src="dentifrice.jpg" alt="Produit 6">
                    <h4>Dentifrice</h4>
                    <p class="prix">€7.99</p>
                    <button class="btn-ajouter">Ajouter au panier</button>
                </div>
            </section>
        </main>
    </body>
</html>
